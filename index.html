<!DOCTYPE html><html><head><meta charset="utf-8"/><title>Map</title><link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/><style>html,body,#map{height:100%%;margin:0}</style></head><body><div id="map"></div><script src="https://unpkg.com/leaflet/dist/leaflet.js"></script><script>
var map=L.map('map');
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'OSM'}).addTo(map);
fetch('geo.json').then(r=>r.json()).then(g=>{var layer=L.geoJSON(g,{onEachFeature:(f,l)=>l.bindPopup(f.properties.name)}).addTo(map);map.fitBounds(layer.getBounds());});
</script></body></html>
